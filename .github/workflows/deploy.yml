name: Deploy

on:
  push:
    branches: [ main ] # main 브랜치에 푸시될 때 실행

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          # --- 프록시 설정 추가 ---
          proxy_host: ${{ secrets.PROXY_HOST }} # 프록시 서버 IP
          proxy_port: ${{ secrets.PROXY_PORT }} # 프록시 서버 포트
          proxy_username: ${{ secrets.PROXY_USER }} # 프록시 계정 (필요한 경우)
          proxy_password: ${{ secrets.PROXY_PASS }} # 프록시 비번 (필요한 경우)
          debug: true 
          # -----------------------
          script: |
            cd /var/www/apps/chatbot
            git pull origin main
            npm install
            pm2 restart all || npm start
