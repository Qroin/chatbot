name: chatbot

on:
  push:
    branches: [ main ]    # main 브랜치에 push 하면 자동 실행
  workflow_dispatch:      # <--- 이 줄 덕분에 GitHub 웹 UI에 "Run workflow" 버튼이 생깁니다!

jobs:
  deploy:
    runs-on: self-hosted  # 우리 서버에 심어놓은 '배달원'을 부릅니다.

    steps:
      # 1. GitHub에서 최신 코드를 서버의 임시 폴더로 가져옵니다.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 실제 앱이 구동되는 폴더로 이동해서 업데이트를 진행합니다.
      - name: Deploy to Server
        run: |
          # 챗봇 앱이 설치된 경로로 이동 (본인의 실제 경로로 수정하세요)
          cd /var/www/apps/chatbot
          
          # 최신 코드 동기화
          git pull origin main
          
          # 의존성 설치 (라이브러리 업데이트)
          npm install
          
          # PM2 등을 사용한다면 앱 재시작 (없으면 생략 가능)
          # pm2 restart chatbot || npm start &
          
          echo "✅ 배포가 성공적으로 완료되었습니다!"
