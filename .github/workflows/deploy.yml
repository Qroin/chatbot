name: chatbot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        run: |
          rsync -av --delete \
            --exclude=.git \
            --exclude=.github \
            ./ /srv/apps/chatbot/
          echo "✅ 배포가 성공적으로 완료되었습니다!"
